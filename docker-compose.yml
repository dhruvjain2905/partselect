version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: partselect
      POSTGRES_PASSWORD: partselect
      POSTGRES_DB: partselect
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U partselect"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
